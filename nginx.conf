server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    location / {
        # Fallback to index.html for Single Page Application routing (Wouter)
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you plan to proxy API requests to your local Nuxeo instance later, 
    # you can uncomment and configure the block below.
    # location /nuxeo/ {
    #     proxy_pass http://host.docker.internal:8080/nuxeo/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}
